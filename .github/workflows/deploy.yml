# =====================================================
# ebl-fe 단독 배포 워크플로
#
# 이 파일은 monorepo의 frontend/.github/workflows/deploy.yml 에 위치하며,
# `git subtree split --prefix=frontend` 결과 ebl-fe repo 루트의
# `.github/workflows/deploy.yml` 로 매핑됩니다.
#
# 동작:
#   1) ebl-fe main 브랜치 push 시 트리거
#   2) Dockerfile 빌드 → ghcr.io/ezvape82/elfbarlounge-frontend 에 push
#   3) Lightsail SSH 진입 → docker compose pull/up -d 로 frontend 컨테이너 교체
#
# 사전 준비 (각 GitHub repo Settings → Secrets and variables → Actions):
#   - DEPLOY_HOST              : Lightsail 정적 IP
#   - DEPLOY_USER              : ubuntu (Lightsail Ubuntu AMI 기본)
#   - DEPLOY_SSH_KEY           : Lightsail 다운로드 SSH 개인키 (.pem 본문)
#   - DEPLOY_PORT              : 22 (선택, 기본 22)
#   - DEPLOY_HOST_FINGERPRINT  : ssh-keyscan -H <host> 결과 fingerprint (MITM 방지)
# =====================================================
name: Deploy Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 동시 배포 방지
concurrency:
  group: deploy-fe-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build frontend image & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner for GHCR
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/elfbarlounge-frontend:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/elfbarlounge-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy frontend to Lightsail
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: SSH & docker pull/restart frontend
        # 운영 도입 후 SHA pinning 권장
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          script: |
            set -euo pipefail
            cd /opt/elfbarlounge
            echo "[deploy-fe] pulling frontend image..."
            docker compose -f infra/docker-compose.yml pull frontend
            echo "[deploy-fe] restarting frontend service..."
            docker compose -f infra/docker-compose.yml up -d frontend
            docker image prune -f
            echo "[deploy-fe] done"
